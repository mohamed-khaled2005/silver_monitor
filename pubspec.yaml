name: silver_monitor
description: تطبيق مراقب الفضة - تطبيق فاخر لأسعار الفضة

publish_to: 'none'

version: 5.0.17+17

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.0.5
  http: ^0.13.6
  shared_preferences: ^2.0.15
  url_launcher: ^6.3.2
  firebase_core: ^4.4.0
  firebase_messaging: ^16.0.2
  flutter_local_notifications: ^17.2.4
  firebase_analytics: ^12.1.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  change_app_package_name: ^1.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700

# إعداد أيقونة التطبيق (Launcher icon) من الصورة assets/images/icon.png
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  image_path_ios: "assets/images/icon_ios.png"
  remove_alpha_ios: true
