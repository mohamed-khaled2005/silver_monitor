name: silver_monitor
description: تطبيق مراقب الفضة - تطبيق فاخر لأسعار الفضة

publish_to: 'none'

version: 5.0.10+10

environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  onesignal_flutter: ^5.2.6
  flutter:
    sdk: flutter
  provider: ^6.0.5
  http: ^0.13.6
  shared_preferences: ^2.0.15
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1
  change_app_package_name: ^1.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700

# إعداد أيقونة التطبيق (Launcher icon) من الصورة assets/images/icon.png
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.png"
  remove_alpha_ios: true
